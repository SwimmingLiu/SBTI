<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDTI人格测试</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #fafafa; color: #222; line-height: 1.7;
  padding: 40px 20px 80px;
}
.container, .result { max-width: 680px; margin: 0 auto; }
.hidden { display: none; }
.result { display: none; }
.result.active { display: block; }
header { text-align: center; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid #ddd; }
h1 { font-size: 26px; font-weight: 600; margin-bottom: 8px; }
.subtitle { font-size: 13px; color: #888; }
.intro {
  background: #f0f0f0; padding: 14px 18px; margin-bottom: 36px;
  font-size: 14px; color: #555; border-left: 3px solid #999;
}
.question { margin-bottom: 36px; }
.q-header { font-size: 13px; color: #888; margin-bottom: 6px; }
.q-text { font-size: 16px; margin-bottom: 14px; font-weight: 500; }
.long-text {
  background: #f5f5f5; padding: 14px 18px; font-size: 14px;
  color: #444; margin-bottom: 14px; line-height: 1.9;
}
.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  padding: 10px 14px; background: #fff; border: 1px solid #ddd;
  cursor: pointer; font-size: 14px; display: flex; gap: 10px;
  transition: all 0.15s;
}
.option:hover { background: #f5f5f5; border-color: #999; }
.option.selected { background: #222; color: #fff; border-color: #222; }
.opt-letter { font-weight: 600; min-width: 16px; }
footer { margin-top: 50px; text-align: center; }
button {
  padding: 12px 40px; font-size: 15px; background: #222;
  color: #fff; border: none; cursor: pointer; font-family: inherit;
}
button:hover { background: #000; }
.footnote { margin-top: 14px; font-size: 12px; color: #999; }
.result h2 { font-size: 14px; color: #888; font-weight: 400; margin-bottom: 8px; }
.result-type {
  font-size: 32px; font-weight: 700; margin-bottom: 24px;
  padding-bottom: 20px; border-bottom: 1px solid #ddd;
}
.result-desc { font-size: 15px; line-height: 1.9; margin-bottom: 30px; color: #333; white-space: pre-line;}
.dimensions { margin-bottom: 30px; }
.dim-item {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px; font-size: 13px;
}
.dim-label { min-width: 78px; color: #666; }
.dim-bar { flex: 1; height: 6px; background: #eee; position: relative; }
.dim-fill { height: 100%; background: #222; width: 0; transition: width 0.8s ease; }
.dim-score { min-width: 36px; text-align: right; color: #888; font-size: 12px; }
.result-note {
  background: #f5f5f5; padding: 14px 18px; font-size: 13px;
  color: #666; margin-bottom: 24px; border-left: 3px solid #999;
  font-style: italic;
}
#result-image {
  display: none;
  max-width: 280px;
  width: 100%;
  margin: 24px auto;
  border: 1px solid #eee;
  border-radius: 4px;
}
.image-credit {
  display: none;
  font-size: 11px;
  color: #999;
  text-align: center;
  margin-top: -16px;
  margin-bottom: 24px;
  font-style: italic;
}
.back-btn { background: #fff; color: #222; border: 1px solid #222; }
.back-btn:hover { background: #222; color: #fff; }
</style>
</head>
<body>

<div class="container" id="quiz">
  <header>
    <h1>SDTI人格测试 v2.1</h1>
    <div class="subtitle">共 32 题 · 一份非常正经的问卷</div>
  </header>
  <div class="intro">答案无对错。维度已隐藏，反正不隐藏你也不会认真答。</div>
  <form id="quiz-form"></form>
  <footer>
    <button type="button" id="submit-btn">提 交</button>
    <div class="footnote">※ 结果仅供娱乐 ※</div>
    <div class="footnote">@Egeria</div>
  </footer>
</div>

<div class="result" id="result">
  <header>
    <h2>你的人格类型是</h2>
    <div class="result-type" id="result-type">—</div>
  </header>
  <div class="result-desc" id="result-desc"></div>
  <div class="result-desc" id="result-desc"></div>
  <img id="result-image" src="" alt="">
  <div class="image-credit" id="image-credit"></div>
  <div class="dimensions" id="dimensions"></div>
  <div class="dimensions" id="dimensions"></div>
  <div class="result-note" id="result-note"></div>
  <footer>
    <button type="button" class="back-btn" id="back-btn">重 新 作 答</button>
    <div class="footnote">@Egeria</div>
  </footer>
</div>

  {n:32,dim:'dark',text:'你刷到另一个男生发朋友圈："今天第一次认真化了个粧，感觉自己变成了香香软软的小蛋糕，走在路上都有人回头看我，原来被温柔对待的感觉是这样的，兄弟们我悟了。" 你的反应是:',opts:[
    {k:'A',t:'点个赞，兄弟加油，化粧确实能改变很多',s:1},
    {k:'B',t:'有点想笑又有点心疼，我们这些人确实要努力一下才能被看见',s:2},
    {k:'C',t:'那有啥，女的啥都没干，降分录取两百分',s:2},
    {k:'D',t:'默默收藏了那篇推文《男生化粧入门教程》，准备自己也试试',s:1}
  ]}
];

const dimensions = {
  drive:   {label:'进取心',  max:10},
  stable:  {label:'自我稳定',max:8},
  intimacy:{label:'亲密需求',max:12},
  guard:   {label:'防御半径',max:10},
  plan:    {label:'掌控欲',  max:6},
  dark:    {label:'清醒度',  max:10}
};

function calcType(s, answers) {

  const triggers = [
    answers['6']  === 'D',
    answers['13'] === 'D',
    answers['29'] === 'D',
    answers['32'] === 'C'
  ];
  const hits = triggers.filter(Boolean).length;

  if (hits >= 2) return {
    name: 'Feminist · 女权主义者 🔓',
    desc: '🎉 你解锁了隐藏结局。🎉 \n\n 这份问卷有 32 道题，其中几道藏着暗号。系统检测到你不仅看穿了规训，而且不打算继续配合。这种人在统计学上叫"异常值"（但样本量正在迅速扩大），在生活里叫"不好惹"，在历史书里叫"herstory——她们后来改变了一些事"。\n\n你不是在玩这个游戏，你是在重写规则手册的页边批注。你知道沉默的代价，也知道开口的代价，权衡之后选择了后者——不是因为后者更轻，而是因为前者更重。',
    note: '代表瞬间: 有人在饭桌上说了一句话，全场都笑了，只有你没笑。然后你慢慢放下筷子，开口说："等一下，刚才那句话——"',
    image: 'feminist.WEBP',
    credit: '画师：小红书 @13读作一三'

  };

  const h = k => s[k] / dimensions[k].max >= 0.7;
  const l = k => s[k] / dimensions[k].max <= 0.35;

  if (h('dark') && h('guard')) return {
    name:'阅人无数型',
    desc:'你看人只需要三秒：前两秒确认对方在说什么，第三秒已经算出这话 30 天后会怎么打脸。你的大脑里装着一个巨型剧本数据库，别人刚开个头你就知道结尾。朋友跟你吐槽新认识的人，你"嗯嗯"应着，心里已经写完了这段感情的讣告。',
    note:'代表瞬间：朋友兴奋地说"我觉得ta不一样"，你面无表情地掏出手机备忘录新建了一条，标题是"倒计时 第 1 天"。'
  };
  if (h('drive') && h('plan')) return {
    name:'我自己来型',
    desc:'"算了我自己来"是你这辈子说得最多的一句话。你不是不会求助，你是算过了——解释的时间够你做完三遍。你的人生信条是"能自己搞定的事绝不麻烦别人，能麻烦别人的事也尽量自己搞定"。累吗？累。但是看着别人把事情搞砸你更累。',
    note:'代表瞬间：同事说"这个我来吧"，你微笑着点头，回到工位后默默把他交的版本重做了一遍。'
  };
  if (l('intimacy') && h('guard')) return {
    name:'省电模式型',
    desc:'出门对你来说是一种消耗战。别人周末想的是"去哪玩"，你周末想的是"怎么让自己合法地不去任何地方"。你拒绝邀约的话术库已经积累到可以出书了，最常用的那句是"那天我有点事"（那天其实没有事，但你本人就是那个事）。',
    note:'代表瞬间：群里问"周六谁有空"，你盯着手机看了三分钟，最后选择了"装死"。'
  };
  if (h('intimacy') && l('stable')) return {
    name:'情绪海绵型',
    desc:'你是行走的情绪收纳盒。朋友失恋你失眠，同事加薪你开心，连楼下卖煎饼的大姨今天没笑你都要担心她是不是家里出了事。你记得身边所有人的怪癖、忌口、过敏源、生日、纪念日，但别人问你"你最近怎么样"，你要想三秒才能回答。',
    note:'代表瞬间：你花了四十分钟安慰完朋友，挂掉电话，发现自己还没吃晚饭，而且也记不起来今天到底饿没饿过。'
  };
  if (h('dark') && l('stable')) return {
    name:'笑着崩溃型',
    desc:'你的人生哲学是"能用段子解决的问题，就不要哭"。同样的糟心事，别人哭三天，你发八百字小作文配一张翻白眼的猫，底下还要回复粉丝："哈哈谢谢，我没事，真的。"（你有事。）你是自己的编剧、导演、主演、和唯一没拿片酬的观众。',
    note:'代表瞬间：跟朋友讲完一个特别惨的故事，朋友沉默了，你紧接着说"没事啦我当笑话讲的"，然后立刻转移话题。'
  };
  if (h('dark')) return {
    name:'社畜觉醒型',
    desc:'你的身体还在工位上打字，你的灵魂已经在三亚的沙滩上晒了两天了。你和同事说话的时候眼神很温柔，那是因为你在想晚饭吃什么。你点头如捣蒜，但你其实一个字都没听进去。你不是懒，你只是把所有的热情都存到了下班之后的那两小时。',
    note:'代表瞬间：老板在会议室慷慨激昂地讲战略，你脸上写着"深受启发"，心里在想"我今天要不要吃麻辣烫"。'
  };
  if (h('stable')) return {
    name:'你说你的型',
    desc:'别人的意见对你来说像是背景音乐，开着也行关了也行。亲戚问你"怎么还不结婚"，你回"哦"；领导说"这个方案要再改改"，你回"好"；陌生人在网上骂你，你发现自己连生气的力气都懒得用。你不是没脾气，你只是把脾气留给了真正值得的事——目前还没有。',
    note:'代表瞬间：家庭群里一场腥风血雨，你潜水三天，出来的时候发了个"吃了吗"，瞬间把话题带走。'
  };
  return {
    name:'施工中型',
    desc:'你的人生是一个永远在 beta 版本的软件，每天都在更新，每次更新都带新 bug。昨天立的 flag 今天已经不认了，今天的你讨厌上周的你，上周的你不理解上上周的你。但你并不慌——因为你发现身边那些从不更新的人，用的还是 Windows XP。',
    note:'代表瞬间：翻到三个月前写的朋友圈，第一反应是"谁啊这是，好矫情"，然后默默删掉。'
  };
}

const form = document.getElementById('quiz-form');
const answers = {};
const multiAnswers = {};

questions.forEach(q => {
  const div = document.createElement('div');
  div.className = 'question';
  const meta = q.multi ? '补充题 · 可多选' : '维度已隐藏';
  let html = `<div class="q-header">第 ${q.n} 题 · ${meta}</div>`;
  html += q.longText ? `<div class="long-text">${q.text}</div>` : `<div class="q-text">${q.text}</div>`;
  html += `<div class="options">`;
  q.opts.forEach(o => {
    html += `<div class="option" data-q="${q.n}" data-opt="${o.k}"${q.multi ? ' data-multi="1"' : ''}>
      <span class="opt-letter">${o.k}</span><span>${o.t}</span>
    </div>`;
  });
  html += `</div>`;
  div.innerHTML = html;
  form.appendChild(div);
});

document.querySelectorAll('.option').forEach(el => {
  el.addEventListener('click', () => {
    const q = el.dataset.q, o = el.dataset.opt;
    if (el.dataset.multi) {
      if (!multiAnswers[q]) multiAnswers[q] = new Set();
      if (multiAnswers[q].has(o)) {
        multiAnswers[q].delete(o);
        el.classList.remove('selected');
      } else {
        multiAnswers[q].add(o);
        el.classList.add('selected');
      }
    } else {
      document.querySelectorAll(`.option[data-q="${q}"]`).forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      answers[q] = o;
    }
  });
});

document.getElementById('submit-btn').addEventListener('click', () => {
  const singleQs = questions.filter(q => !q.multi).length;
  const answered = Object.keys(answers).length;
  if (answered < singleQs) {
    if (!confirm(`还有 ${singleQs - answered} 题没答，确定提交？`)) return;
  }

  const scores = {drive:0,stable:0,intimacy:0,guard:0,plan:0,dark:0};
  questions.forEach(q => {
    if (!q.dim) return;
    const picked = answers[q.n];
    if (!picked) return;
    const opt = q.opts.find(o => o.k === picked);
    if (opt && typeof opt.s === 'number') scores[q.dim] += opt.s;
  });

  const result = calcType(scores, answers);

  document.getElementById('result-type').textContent = result.name;
  document.getElementById('result-desc').textContent = result.desc;
  document.getElementById('result-note').textContent = result.note;
  const imgEl = document.getElementById('result-image');
  const creditEl = document.getElementById('image-credit');
  if (result.image) {
    imgEl.src = result.image;
    imgEl.style.display = 'block';
    creditEl.textContent = result.credit || '';
    creditEl.style.display = 'block';
  } else {
    imgEl.style.display = 'none';
    imgEl.src = '';
    creditEl.style.display = 'none';
    creditEl.textContent = '';
  }

  const dimBox = document.getElementById('dimensions');
  dimBox.innerHTML = '';
  Object.entries(dimensions).forEach(([key, def]) => {
    const pct = Math.round((scores[key] / def.max) * 100);
    dimBox.innerHTML += `
      <div class="dim-item">
        <div class="dim-label">${def.label}</div>
        <div class="dim-bar"><div class="dim-fill" data-pct="${pct}"></div></div>
        <div class="dim-score">${pct}%</div>
      </div>`;
  });

  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});

  setTimeout(() => {
    document.querySelectorAll('.dim-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 100);
});

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('result').classList.remove('active');
  document.getElementById('quiz').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
});
</script>
</body>
</html>
